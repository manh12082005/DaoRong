        // 1. Lấy ảnh từ bộ nhớ
        const img = dragonSprites[tid];

        // Nếu chưa load ảnh, trả về ngay để tránh lỗi
        if (!img || img.complete === false) {
          // Có thể vẽ một hình vuông đỏ để báo lỗi nếu ảnh chưa load
          return;
        }

        const s = size / 100;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(facing, 1);

        // 2. Vẽ bóng đổ (vẫn giữ để tạo cảm giác rồng đứng trên mặt đất)
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(0, 35 * s, 25 * s, 8 * s, 0, 0, Math.PI * 2);
        ctx.fill();

        // 3. VẼ ẢNH RỒNG (Thay thế hoàn toàn các lệnh vẽ hình học cũ)
        // -size/2: căn giữa theo chiều ngang
        // -size/2: căn giữa theo chiều dọc
        // size, size: kích thước hiển thị
        ctx.drawImage(img, -size / 2, -size / 2, size, size);

        // 4. Vòng chọn (Nếu rồng được chọn)
        if (selected) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();
      }

      // ======================================================
      // KHỞI TẠO ẢNH (DÁN ĐOẠN NÀY VÀO PHÍA TRÊN CÙNG CỦA FILE)
      // ======================================================
      const dragonSprites = {
        fire: new Image(),
        water: new Image(),
        electric: new Image(),
        earth: new Image(),
        ice: new Image(),
        dark: new Image(),    
        light: new Image(),
        poison: new Image(),
        steam: new Image(),   
        thunder: new Image(),
        demon: new Image(),

      };

      // Load ảnh
      dragonSprites.fire.src = 'assets/fire_dragon.png';
      dragonSprites.water.src = 'assets/water_dragon.png';
      dragonSprites.electric.src = 'assets/electric_dragon.png';
      dragonSprites.earth.src = 'assets/earth_dragon.png';
      dragonSprites.ice.src = 'assets/ice_dragon.png';
      dragonSprites.dark.src = 'assets/dark_dragon.png';
      dragonSprites.light.src = 'assets/light_dragon.png';
      dragonSprites.poison.src = 'assets/poison_dragon.png';
      dragonSprites.steam.src = 'assets/steam_dragon.png';
      dragonSprites.thunder.src = 'assets/thunder_dragon.png';
      dragonSprites.demon.src = 'assets/demon_dragon.png';
      //island
      const islandAssets = {
        bg: new Image(),
        tree: new Image(),
        gold: new Image()
      };
      islandAssets.bg.src = 'assets/island_bg.png'; // File ảnh nền đảo của bạn
      islandAssets.tree.src = 'assets/tree.png';
      islandAssets.gold.src = 'assets/gold_mine.png';
      // ============================================================
      // ISLAND DRAWING
      // ============================================================
      function drawIsland(ctx, W, H) {
        const cx = W / 2, cy = H * 0.62;
        const rx = W * 0.45, ry = H * 0.28;

        // Sky gradient
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, '#0a1628'); sky.addColorStop(0.5, '#0e2d5a'); sky.addColorStop(1, '#1a5a8a');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

        // Stars
        ctx.save();
        for (let i = 0; i < 60; i++) {
          const x = (Math.sin(i * 137.5) * 0.5 + 0.5) * W;
          const y = (Math.sin(i * 97.3) * 0.5 + 0.5) * (H * 0.6);
          const r = Math.random() * 1.5 + 0.5;
          ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.sin(Date.now() / 800 + i) * 0.4})`;
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        // Distant clouds
        [[W * 0.1, H * 0.15, 120, 40], [W * 0.8, H * 0.1, 100, 35], [W * 0.5, H * 0.08, 150, 45]].forEach(([x, y, w, h]) => {
          ctx.save(); ctx.globalAlpha = 0.12;
          ctx.fillStyle = '#7ecef4';
          ctx.beginPath(); ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(x - w * 0.3, y + h * 0.2, w * 0.6, h * 0.7, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(x + w * 0.3, y + h * 0.1, w * 0.5, h * 0.6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        });

        // Water glow under island
        const wg = ctx.createRadialGradient(cx, cy + ry * 0.5, 0, cx, cy + ry * 0.5, rx * 1.1);
        wg.addColorStop(0, 'rgba(56,189,248,0.25)'); wg.addColorStop(1, 'transparent');
        ctx.fillStyle = wg;
        ctx.beginPath(); ctx.ellipse(cx, cy + ry * 0.5, rx * 1.15, ry * 0.3, 0, 0, Math.PI * 2); ctx.fill();

        // Island shadow (underneath)
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath(); ctx.ellipse(cx, cy + ry * 0.85, rx * 0.85, ry * 0.18, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Island base — rock/cliff edge
        const cliffGrad = ctx.createLinearGradient(cx, cy + ry * 0.3, cx, cy + ry * 0.9);
        cliffGrad.addColorStop(0, '#4a3728'); cliffGrad.addColorStop(0.5, '#3d2e22'); cliffGrad.addColorStop(1, '#2a1f17');
        ctx.fillStyle = cliffGrad;
        ctx.beginPath();
        ctx.ellipse(cx, cy + ry * 0.5, rx * 0.92, ry * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        // Cliff texture lines
        ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          const py = cy + ry * 0.4 + i * ry * 0.08;
          ctx.beginPath(); ctx.ellipse(cx, py, rx * 0.85 - i * 10, 6, 0, 0, Math.PI); ctx.stroke();
        }

        // Main island ground — lush green
        const gGrad = ctx.createRadialGradient(cx - rx * 0.1, cy - ry * 0.2, ry * 0.1, cx, cy, rx);
        gGrad.addColorStop(0, '#4ade80'); gGrad.addColorStop(0.3, '#22c55e'); gGrad.addColorStop(0.7, '#16a34a'); gGrad.addColorStop(1, '#166534');
        ctx.fillStyle = gGrad;
        ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry * 0.72, 0, 0, Math.PI * 2); ctx.fill();

        // Grass texture patches
        ctx.save();
        ctx.fillStyle = 'rgba(134,239,172,0.3)';
        for (let i = 0; i < 12; i++) {
          const a = i / 12 * Math.PI * 2, dr = 0.3 + Math.sin(i * 3) * 0.3;
          const px = cx + Math.cos(a) * rx * dr, py = cy + Math.sin(a) * ry * dr * 0.4;
          ctx.beginPath(); ctx.ellipse(px, py, rx * 0.06, ry * 0.04, a, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        // Paths / dirt roads on island
        ctx.save();
        ctx.strokeStyle = 'rgba(161,120,80,0.4)'; ctx.lineWidth = 8; ctx.lineCap = 'round';
        ctx.setLineDash([12, 8]);
        ctx.beginPath(); ctx.moveTo(cx - rx * 0.3, cy); ctx.lineTo(cx + rx * 0.3, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - ry * 0.3); ctx.lineTo(cx, cy + ry * 0.3); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // Decorative trees / bushes around island edge
        const treePts = [
          [cx - rx * 0.7, cy - ry * 0.15], [cx + rx * 0.72, cy - ry * 0.1],
          [cx - rx * 0.5, cy + ry * 0.3], [cx + rx * 0.55, cy + ry * 0.28],
          [cx - rx * 0.15, cy - ry * 0.55], [cx + rx * 0.2, cy - ry * 0.5],
          [cx - rx * 0.8, cy + ry * 0.1], [cx + rx * 0.8, cy + ry * 0.05],
        ];
        treePts.forEach(([tx, ty], i) => drawTree(ctx, tx, ty, 18 + i % 3 * 4));

        // Small flowers
        const flowerPts = [[cx - rx * 0.3, cy - ry * 0.3], [cx + rx * 0.35, cy - ry * 0.25], [cx - rx * 0.5, cy + ry * 0.1], [cx + rx * 0.4, cy + ry * 0.2]];
        flowerPts.forEach(([fx, fy], i) => drawFlower(ctx, fx, fy, ['#ff6b6b', '#ff9f43', '#ffd700', '#a29bfe'][i]));

        // Waterfall effect on one side
        ctx.save();
        const wfx = cx + rx * 0.85, wfy = cy;
        const wfGrad = ctx.createLinearGradient(wfx, wfy - ry * 0.3, wfx, wfy + ry * 0.3);
        wfGrad.addColorStop(0, 'rgba(147,210,248,0)'); wfGrad.addColorStop(0.5, 'rgba(147,210,248,0.4)'); wfGrad.addColorStop(1, 'rgba(147,210,248,0)');
        ctx.fillStyle = wfGrad;
        ctx.fillRect(wfx - 6, wfy - ry * 0.3, 12, ry * 0.6);
        // Spray
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath(); ctx.ellipse(wfx, wfy + ry * 0.3, 18, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      function drawTree(ctx, x, y, size) {
        // Trunk
        ctx.fillStyle = '#78350f';
        ctx.beginPath(); ctx.rect(x - size * 0.15, y, size * 0.3, size * 0.6); ctx.fill();
        // Canopy layers
        [[0, '#166534', 1.1], [-.3, '#15803d', 0.9], [-.55, '#4ade80', 0.7]].forEach(([dy, col, sc]) => {
          ctx.fillStyle = col;
          ctx.beginPath(); ctx.arc(x, y + dy * size, size * sc * 0.55, 0, Math.PI * 2); ctx.fill();
        });
      }
      function drawFlower(ctx, x, y, col) {
        ctx.fillStyle = col;
        for (let i = 0; i < 5; i++) {
          const a = i / 5 * Math.PI * 2;
          ctx.beginPath(); ctx.ellipse(x + Math.cos(a) * 6, y + Math.sin(a) * 6, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = '#fde68a';
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
      }

      // ============================================================
      // BUILDING RENDERING
      // ============================================================
      const BICONS = { 'farm': '🌾', 'hatch': '🥚', 'arena': '⚔️', 'market': '🏪', 'lab': '🔬' };
      const BNAMES = { 'farm': 'Trang Trại', 'hatch': 'Nhà Ấp', 'arena': 'Đấu Trường', 'market': 'Chợ Rồng', 'lab': 'Phòng Thí Nghiệm' };

      function drawBuilding(ctx, b, W, H, cx, cy) {
        const bx = cx + (b.x - 0.5) * W * 0.8;
        const by = cy + (b.y - 0.5) * H * 0.85;
        const sz = 36;

        // Platform
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(bx, by + sz * 0.6, sz * 0.8, sz * 0.2, 0, 0, Math.PI * 2); ctx.fill();

        // Building base
        const bGrad = ctx.createLinearGradient(bx - sz, by - sz * 0.5, bx + sz, by + sz);
        bGrad.addColorStop(0, '#3b5998'); bGrad.addColorStop(1, '#1a2a5e');
        ctx.fillStyle = bGrad;
        ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(bx - sz, by - sz * 0.6, sz * 2, sz * 1.2, 8);
        ctx.fill(); ctx.stroke();

        // Roof
        ctx.fillStyle = '#4a3728';
        ctx.beginPath();
        ctx.moveTo(bx - sz, by - sz * 0.6); ctx.lineTo(bx, by - sz * 1.4); ctx.lineTo(bx + sz, by - sz * 0.6); ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

        // Roof tiles
        ctx.fillStyle = '#5d4037';
        for (let i = 0; i < 4; i++) {
          const tx = bx - sz + i * sz * 0.5 + sz * 0.25, ty = by - sz * 0.8;
          ctx.beginPath(); ctx.rect(tx, ty, sz * 0.4, sz * 0.15); ctx.fill();
        }

        // Icon
        ctx.font = `${sz * 0.65}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(BICONS[b.t] || '🏠', bx, by);

        // Name label
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath(); ctx.roundRect(bx - sz * 0.9, by + sz * 0.65, sz * 1.8, 18, 6); ctx.fill();
        ctx.fillStyle = '#ffd700'; ctx.font = `bold 10px 'Baloo 2',sans-serif`;
        ctx.fillText(BNAMES[b.t] || b.t, bx, by + sz * 0.75 + 1);

        // Farm progress bar
        if (b.t === 'farm') {
          const pct = b.timer / b.max;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.beginPath(); ctx.roundRect(bx - sz * 0.85, by + sz * 0.88, sz * 1.7, 7, 4); ctx.fill();
          if (pct >= 1) {
            ctx.fillStyle = '#00e676';
          } else {
            const pg = ctx.createLinearGradient(bx - sz * 0.85, 0, bx + sz * 0.85, 0);
            pg.addColorStop(0, '#f59e0b'); pg.addColorStop(1, '#22c55e');
            ctx.fillStyle = pg;
          }
          ctx.beginPath(); ctx.roundRect(bx - sz * 0.85 + 1, by + sz * 0.88 + 1, Math.max(0, (sz * 1.7 - 2) * pct), 5, 3); ctx.fill();
          if (pct >= 1) {
            ctx.fillStyle = '#00e676'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('✓ Thu hoạch!', bx, by + sz * 1.12);
          }
        }
        ctx.restore();
        return { x: bx - sz, y: by - sz * 1.4, w: sz * 2, h: sz * 2.8 };
      }

      // ============================================================
      // MAIN RENDER LOOP
      // ============================================================
      let animFrame = 0;
      let particles = [];
      let dragonAnims = {}; // per-dragon anim offset

      function render() {
        requestAnimationFrame(render);
        animFrame++;
        const cx = W / 2, cy = H * 0.52;
        ctx.clearRect(0, 0, W, H);

        // --- SỬA Ở ĐÂY: Thay drawIsland bằng ảnh nền ---
        if (islandAssets.bg.complete) {
          ctx.drawImage(islandAssets.bg, 0, 0, W, H);
        } else {
          // Vẫn gọi drawIsland làm nền tạm nếu ảnh chưa kịp load
          drawIsland(ctx, W, H);
        }

        // Draw buildings
        G.buildings.forEach((b, i) => {
          b._bounds = drawBuilding(ctx, b, W, H, cx, cy);
        });

        // Draw dragons on island
        const dpos = getDragonPositions(W, H, cx, cy);
        G.dragons.forEach((d, i) => {
          if (!dragonAnims[i]) dragonAnims[i] = i * 1.5;
          const p = dpos[i % dpos.length];
          const floatY = Math.sin(animFrame / 45 + dragonAnims[i]) * 8;
          const dt = DM[d.tid] || DM.fire;
          const sz = 50 + dt.r * 5;
          drawDragonChibi(ctx, d.tid, p.x, p.y + floatY, sz, 1, false, false);
          // HP bar... (giữ nguyên phần code HP và Name dưới đây)
          const bw = 55, bh = 5;
          const bx = p.x - bw / 2, by = p.y + floatY + sz * 0.52;
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
          const hpPct = d.hp / d.mhp;
          const hcol = hpPct > 0.6 ? '#00e676' : hpPct > 0.3 ? '#ffd700' : '#ff1744';
          ctx.fillStyle = hcol;
          ctx.beginPath(); ctx.roundRect(bx + 1, by + 1, Math.max(0, (bw - 2) * hpPct), bh - 2, 2); ctx.fill();
          ctx.fillStyle = 'rgba(0,0,0,0.65)';
          ctx.beginPath(); ctx.roundRect(p.x - 28, by + 7, 56, 14, 5); ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = 'bold 9px "Baloo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'top';
          ctx.fillText(d.n.slice(0, 10), p.x, by + 8.5);
          ctx.fillStyle = '#ffd700';
          ctx.beginPath(); ctx.arc(p.x + 28, p.y + floatY - sz * 0.45, 9, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#000'; ctx.font = 'bold 8px sans-serif'; ctx.textBaseline = 'middle';
          ctx.fillText(d.lv, p.x + 28, p.y + floatY - sz * 0.45);
        });

        // Particles
        particles = particles.filter(p => {
          p.life -= 0.04;
          if (p.life <= 0) return false;
          p.x += p.vx; p.y += p.vy; p.vy += 0.15;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.col;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
          return true;
        });
      }
      function getDragonPositions(W, H, cx, cy) {
        const rx = W * 0.35, ry = H * 0.2;
        return [
          { x: cx - rx * 0.55, y: cy - ry * 0.4 },
          { x: cx + rx * 0.5, y: cy - ry * 0.5 },
          { x: cx, y: cy - ry * 0.7 },
          { x: cx - rx * 0.2, y: cy - ry * 0.2 },
          { x: cx + rx * 0.2, y: cy - ry * 0.15 },
          { x: cx - rx * 0.7, y: cy - ry * 0.1 },
          { x: cx + rx * 0.65, y: cy - ry * 0.05 },
          { x: cx, y: cy - ry * 0.4 },
        ];
      }

      function spawnParticles(x, y, col, n = 12) {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 4;
          particles.push({
            x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
            r: 3 + Math.random() * 4, col, life: 1
          });
        }
      }

      // ============================================================
      // CLICK HANDLING
      // ============================================================
      canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const W2 = canvas.width, H2 = canvas.height, cx = W2 / 2, cy = H2 * 0.52;

        // Check buildings
        G.buildings.forEach((b, i) => {
          if (b._bounds) {
            const bd = b._bounds;
            if (mx >= bd.x && mx <= bd.x + bd.w && my >= bd.y && my <= bd.y + bd.h) {
              onBuildingClick(i, mx, my);
            }
          }
        });

        // Check dragons
        const dpos = getDragonPositions(W2, H2, cx, cy);
        G.dragons.forEach((d, i) => {
          const p = dpos[i % dpos.length];
          const dt = DM[d.tid] || DM.fire;
          const sz = (50 + dt.r * 5) * 0.6;
          const dist = Math.sqrt((mx - p.x) ** 2 + (my - p.y) ** 2);
          if (dist < sz) { openDetailPanel(i); }
        });
      });

      function onBuildingClick(i, mx, my) {
        const b = G.buildings[i];
        if (b.t === 'farm') {
          if (b.timer >= b.max) {
            const got = 20 + b.lv * 15; G.food += got; b.timer = 0;
            showToast(`🍖 Thu hoạch được ${got} thức ăn!`, '#4ade80');
            floatText(mx, my + 52, `+${got} 🍖`, '#4ade80');
            spawnParticles(mx, my + 52, '#4ade80');
            updateHUD();
          } else showToast(`🌾 Đang trồng... ${b.max - b.timer}s còn lại`, '#fbbf24');
        } else if (b.t === 'arena') startBattle();
        else if (b.t === 'hatch') openPanel('breed-ov');
        else if (b.t === 'market') openPanel('shop-ov');
        else showToast(`${BNAMES[b.t]} - Cấp ${b.lv}`, '#ffd700');
      }

      // ============================================================
      // UI HELPERS
      // ============================================================
      function updateHUD() {
        document.getElementById('hgold').textContent = G.gold.toLocaleString();
        document.getElementById('hfood').textContent = G.food;
        document.getElementById('hgem').textContent = G.gem;
        document.getElementById('henergy').textContent = G.energy;
      }
      let toastTimer;
      function showToast(msg, col = '#ffd700') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.color = col;
        t.classList.add('on');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('on'), 2500);
      }
      function floatText(x, y, txt, col = '#ffd700') {
        const el = document.createElement('div');
        el.className = 'ft'; el.textContent = txt;
        el.style.cssText = `left:${x - 20}px;top:${y - 20}px;color:${col}`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1400);
      }
      function openPanel(id) { document.getElementById(id).classList.add('on') }
      function closePanel(id) { document.getElementById(id).classList.remove('on') }
      function setTab(btn, tab) {
        document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
      }

      // ============================================================
      // DRAGON COLLECTION PANEL
      // ============================================================
      function openDetailPanel(i) {
        const d = G.dragons[i]; const dt = DM[d.tid] || DM.fire;
        const el = document.getElementById('detail-content');
        el.innerHTML = `
    <div style="text-align:center">
      <div style="font-family:'Fredoka One';font-size:20px;color:${dt.c[2]};margin-bottom:14px">${d.n}</div>
      <canvas id="dcv" width="130" height="130" style="display:block;margin:0 auto"></canvas>
      <div style="margin-top:8px;font-size:12px;color:#aaa">${dt.e} ${dt.e === '🔥' ? 'Lửa' : dt.n} · Cấp ${d.lv} · ${'⭐'.repeat(dt.r)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;text-align:left">
        ${[['❤️ Máu', `${d.hp}/${d.mhp}`, '#ff6b6b'], ['🗡️ Sát thương', `${10 + d.lv * 5}`, '#ffa502'],
          ['✨ Kỹ năng', dt.skill, '#a29bfe'], ['📈 XP', `${d.xp}/100`, '#ffd700']].map(([lbl, val, col]) => `
        <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px">

    <div style="border-top:1px solid rgba(255,255,255,.1);margin-top:14px;padding-top:12px">

      // ============================================================
      // BATTLE SYSTEM
      // ============================================================
      let BS = null;
      let bAnimId = null;
      let bCamShake = 0;

      function startBattle() {
        startBattleEnemy(Math.min(G.mapLv - 1, ENEMIES.length - 1));
      }
      function startBattleWith(dragonIdx) {
        startBattleEnemy(Math.min(G.mapLv - 1, ENEMIES.length - 1), dragonIdx);
      }
      function startBattleEnemy(enemyIdx, dragonIdx = 0) {
        if (G.dragons.length === 0) { showToast('❌ Bạn chưa có rồng nào!', '#ef4444'); return; }
        if (G.energy <= 0) { showToast('❌ Hết năng lượng!', '#ef4444'); return; }
        G.energy--; updateHUD();
        const pd = G.dragons[dragonIdx];
        const ed = JSON.parse(JSON.stringify(ENEMIES[enemyIdx]));
        BS = {
          player: { ...pd, hp: pd.hp, mhp: pd.mhp, xp: pd.xp },
          enemy: ed,
          turn: 'player', over: false,
          pdIdx: dragonIdx, edIdx: enemyIdx,
          log: [], pAnim: 0, eAnim: 0,
          pHit: 0, eHit: 0,
        };
        document.getElementById('battle').classList.add('on');
        updateBattleUI();
        bLog(`⚔️ ${BS.player.n} vs ${BS.enemy.n}! Chiến đấu bắt đầu!`);
        renderBattle();
      }
      function renderBattle() {
        if (!BS) return;
        const bc = document.getElementById('bc');
        const bctx = bc.getContext('2d');
        const W = bc.width, H = bc.height;
        bctx.clearRect(0, 0, W, H);

        // BG
        const bg = bctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#0f0824'); bg.addColorStop(1, '#1a0a3e');
        bctx.fillStyle = bg; bctx.fillRect(0, 0, W, H);

        // Arena floor
        bctx.fillStyle = '#1a3a1a';
        bctx.beginPath(); bctx.ellipse(W / 2, H - 25, W * 0.48, 28, 0, 0, Math.PI * 2); bctx.fill();
        bctx.strokeStyle = 'rgba(56,200,100,.3)'; bctx.lineWidth = 2;
        bctx.beginPath(); bctx.ellipse(W / 2, H - 25, W * 0.48, 28, 0, 0, Math.PI * 2); bctx.stroke();
        // Center line
        bctx.strokeStyle = 'rgba(255,215,0,.15)'; bctx.lineWidth = 1; bctx.setLineDash([8, 6]);
        bctx.beginPath(); bctx.moveTo(W / 2, H - 55); bctx.lineTo(W / 2, 10); bctx.stroke();
        bctx.setLineDash([]);

        // Camera shake
        let sx = 0, sy = 0;
        if (bCamShake > 0) { sx = (Math.random() - 0.5) * bCamShake * 2; sy = (Math.random() - 0.5) * bCamShake; bCamShake--; }

        // Player dragon
        const pdt = DM[BS.player.tid] || DM.fire;
        const pSz = 90;
        const pGlow = BS.pHit > 0;
        if (pGlow) bCamShake = 3;
        drawDragonChibi(bctx, BS.player.tid, 130 + sx, H - 65 + sy, pSz, 1, pGlow, false);
        if (BS.pHit > 0) BS.pHit--;

        // Enemy dragon (flipped)
        const eSz = 90;
        const eGlow = BS.eHit > 0;
        drawDragonChibi(bctx, BS.enemy.tid, W - 130 - sx, H - 65 - sy, eSz, -1, eGlow, false);
        if (BS.eHit > 0) BS.eHit--;

        // VS
        bctx.save();
        bctx.font = 'bold 22px Fredoka One,sans-serif';
        bctx.textAlign = 'center'; bctx.textBaseline = 'middle';
        bctx.fillStyle = 'rgba(255,215,0,0.7)';
        bctx.fillText('VS', W / 2, H / 2 - 10);
        bctx.restore();

        if (!BS.over) bAnimId = requestAnimationFrame(renderBattle);
      }
      function updateBattleUI() {
        if (!BS) return;
        const p = BS.player, e = BS.enemy;
        document.getElementById('bpname').textContent = '🐉 ' + p.n;
        document.getElementById('bename').textContent = e.n;
        document.getElementById('bphp').style.width = Math.max(0, p.hp / p.mhp * 100) + '%';
        document.getElementById('behp').style.width = Math.max(0, e.hp / e.hp > 0 ? (e.hp / (ENEMIES[BS.edIdx].hp)) * 100 : 0) + '%';
        document.getElementById('bphpt').textContent = `HP ${Math.max(0, p.hp)}/${p.mhp}`;
        document.getElementById('behpt').textContent = `HP ${Math.max(0, e.hp)}/${ENEMIES[BS.edIdx].hp}`;
        // Fix enemy hp bar
        const maxEhp = ENEMIES[BS.edIdx].hp;
        document.getElementById('behp').style.width = Math.max(0, (e.hp / maxEhp) * 100) + '%';
        document.getElementById('behpt').textContent = `HP ${Math.max(0, e.hp)}/${maxEhp}`;
      }
      function bLog(msg) {
        const l = document.getElementById('blog');
        const d = document.createElement('div'); d.textContent = msg;
        l.appendChild(d); l.scrollTop = l.scrollHeight;
      }
      function calcDmg(atk, def, base) {
        const w = WEAK[atk] || [];
        if (w.includes(def)) return Math.floor(base * 0.6);
        const wd = WEAK[def] || [];
        if (wd.includes(atk)) return Math.floor(base * 1.6);
        return base;
      }
      function doAttack(type) {
        if (!BS || BS.over || BS.turn !== 'player') return;
        const p = BS.player, e = BS.enemy;
        let dmg = 10 + p.lv * 5;
        if (type === 'skill') { dmg = Math.floor(dmg * 1.9); bLog(`✨ ${p.n} dùng ${(DM[p.tid] || DM.fire).skill}!`); }
        else bLog(`⚔️ ${p.n} tấn công!`);
        dmg = calcDmg(p.tid, e.tid, dmg);
        dmg = Math.floor(dmg * (0.8 + Math.random() * 0.4));
        e.hp -= dmg; BS.eHit = 6;
        bLog(`💥 Gây ${dmg} sát thương!`);
        updateBattleUI();
        if (e.hp <= 0) { winBattle(); return; }
        BS.turn = 'enemy';
        setTimeout(() => {
          if (!BS) return;
          let ed = 8 + e.lv * 4;
          ed = calcDmg(e.tid, p.tid, ed);
          ed = Math.floor(ed * (0.8 + Math.random() * 0.4));
          p.hp -= ed; BS.pHit = 6;
          bLog(`💀 ${e.n} phản công! Gây ${ed} sát thương!`);
          updateBattleUI();
          BS.turn = 'player';
          if (p.hp <= 0) loseBattle();
        }, 700);
      }
      function winBattle() {
        BS.over = true;
        const rw = ENEMIES[BS.edIdx].rw;
        G.gold += rw.g; G.food += rw.f; G.wins++;
        if (G.mapLv <= BS.edIdx + 1) G.mapLv = BS.edIdx + 2;
        const pd = G.dragons[BS.pdIdx];
        pd.xp = (pd.xp || 0) + rw.xp;
        while (pd.xp >= 100) { pd.lv++; pd.xp -= 100; pd.mhp += 20; }
        pd.hp = Math.max(1, BS.player.hp);
        bLog(`🏆 CHIẾN THẮNG! +${rw.g}🪙 +${rw.f}🍖 +${rw.xp}XP`);
        updateHUD();
        setTimeout(() => { endBattle(); showToast(`🏆 Thắng! +${rw.g}🪙`, '#ffd700'); spawnParticles(W / 2, H / 2, '#ffd700', 30); }, 1500);
      }
      function loseBattle() {
        BS.over = true;
        const pd = G.dragons[BS.pdIdx];
        pd.hp = Math.max(1, Math.floor(pd.mhp * 0.15));
        bLog(`💀 THUA! Hãy luyện tập rồng mạnh hơn.`);
        setTimeout(() => { endBattle(); showToast('💀 Thua rồi! Nuôi rồng thêm nào.', '#ef4444'); }, 1500);
      }
      function endBattle() {
        BS = null; if (bAnimId) cancelAnimationFrame(bAnimId); bAnimId = null;
        document.getElementById('battle').classList.remove('on');
        document.getElementById('blog').innerHTML = '';
      }

      // ============================================================
      // GAME LOOP (TIMERS)
      // ============================================================
      setInterval(() => {
        G.buildings.forEach(b => {
          if (b.t === 'farm' && b.timer < b.max) b.timer++;
        });
        if (G.breedTimer > 0) {
          G.breedTimer--;
          if (G.breedTimer <= 0) {
            G.eggReady = true;
            showToast('🥚 Trứng đã sẵn sàng! Vào Lai Tạo để nhận.', '#a78bfa');
            if (document.getElementById('breed-ov').classList.contains('on')) renderBreed();
          } else if (document.getElementById('breed-ov').classList.contains('on')) renderBreed();
        }
      }, 1000);

      // Gold income passive
      setInterval(() => {
        const earned = 5 + G.dragons.reduce((s, d) => s + d.lv, 0) * 2;
        G.gold += earned; updateHUD();
        floatText(document.getElementById('hgold').getBoundingClientRect().right - 30, 58, `+${earned}🪙`, '#ffd700');
      }, 8000);

      // Energy regen
      setInterval(() => {
        if (G.energy < 10) { G.energy++; updateHUD(); showToast('⚡ +1 Năng lượng nạp lại!', '#fbbf24'); }
      }, 30000);

      // ============================================================
      // START
      // ============================================================
      updateHUD();
      render();
      setTimeout(() => showToast('🐉 Chào mừng đến Đảo Rồng! Nhấn vào rồng để xem thông tin.', '#ffd700'), 1200);
    </script>
  </body>

  </html>
